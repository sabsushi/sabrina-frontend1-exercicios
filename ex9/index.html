<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Exercício Splide - Cat Gallery</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 class="gallery-title">Cat gallery :3</h1>

        <section class="splide" aria-label="Galeria de Gatos">
            <div class="splide__track">
                <ul class="splide__list">
                    <li class="splide__slide"><img src="https://cataas.com/cat?1" alt="Gato 1"></li>
                    <li class="splide__slide"><img src="https://cataas.com/cat?2" alt="Gato 2"></li>
                    <li class="splide__slide"><img src="https://cataas.com/cat?3" alt="Gato 3"></li>
                    <li class="splide__slide"><img src="https://cataas.com/cat?4" alt="Gato 4"></li>
                </ul>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
